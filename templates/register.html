<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Quiniela Mundial 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-container {
            width: 100%;
            max-width: 600px;
        }

        .register-card {
            background: white;
            border-radius: 30px;
            padding: 45px 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .register-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-icon {
            font-size: 55px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
        }

        .register-header h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .register-header p {
            color: #6b7280;
            font-size: 14px;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 600;
            font-size: 14px;
        }

        .input-group {
            position: relative;
        }

        .input-group i:first-child {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 18px;
            z-index: 1;
        }

        .form-group input {
            width: 100%;
            padding: 14px 45px 14px 45px;
            border: 2px solid #e5e7eb;
            border-radius: 15px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #9ca3af;
            font-size: 18px;
            z-index: 1;
            transition: all 0.3s ease;
        }

        .toggle-password:hover {
            color: #667eea;
            transform: translateY(-50%) scale(1.1);
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-bar {
            width: 0%;
            height: 100%;
            transition: width 0.3s;
        }

        .strength-text {
            font-size: 11px;
            margin-top: 5px;
            color: #6b7280;
        }

        .seleccion-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
            margin-top: 10px;
            max-height: 300px;
            overflow-y: auto;
            padding: 15px;
            border: 2px solid #e5e7eb;
            border-radius: 15px;
            background: #f9fafb;
        }

        .seleccion-grid::-webkit-scrollbar {
            width: 8px;
        }

        .seleccion-grid::-webkit-scrollbar-track {
            background: #e5e7eb;
            border-radius: 4px;
        }

        .seleccion-grid::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 4px;
        }

        .seleccion-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 8px;
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .seleccion-item:hover {
            transform: translateY(-3px);
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .seleccion-item.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: #667eea;
            color: white;
        }

        .seleccion-item .bandera {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .seleccion-item .pais-nombre {
            font-size: 11px;
            font-weight: 500;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.4);
        }

        .login-link {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 700;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-error {
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .alert-success {
            background: #dcfce7;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <div class="logo-icon">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h1>Crear Cuenta</h1>
                <p>Regístrate gratis y participa en la quiniela</p>
            </div>

            <div id="alertContainer"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="nombre" placeholder="Ej: Juan Pérez" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="tu@email.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('password', this)"></i>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="strength-text" id="strengthText"></div>
                </div>

                <div class="form-group">
                    <label>Confirmar Contraseña</label>
                    <div class="input-group">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" id="confirmPassword" placeholder="Repite tu contraseña" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('confirmPassword', this)"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-flag"></i> Elige a tu selección favorita para ganar el mundial</label>
                    <div class="seleccion-grid" id="seleccionGrid">
                        <!-- Las selecciones se cargarán aquí -->
                        <div style="text-align:center;grid-column:1/-1;">Cargando selecciones...</div>
                    </div>
                    <input type="hidden" id="seleccionFavorita" name="seleccion_favorita">
                </div>

                <button type="submit" class="btn-register">Registrarse</button>
            </form>

            <div class="login-link">
                <p>¿Ya tienes cuenta? <a href="/login">Inicia sesión aquí</a></p>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');

        function checkPasswordStrength(password) {
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            const percentages = ['20%', '40%', '60%', '80%', '100%'];
            const colors = ['#ef4444', '#f59e0b', '#eab308', '#84cc16', '#22c55e'];
            const texts = ['Muy débil', 'Débil', 'Regular', 'Fuerte', 'Muy fuerte'];
            
            const index = Math.min(strength, 4);
            strengthBar.style.width = percentages[index];
            strengthBar.style.backgroundColor = colors[index];
            strengthText.textContent = texts[index];
            strengthText.style.color = colors[index];
        }

        passwordInput.addEventListener('input', (e) => {
            checkPasswordStrength(e.target.value);
        });

        const selecciones = [
            {codigo: "arg", nombre: "Argentina", bandera: "🇦🇷"},
            {codigo: "bra", nombre: "Brasil", bandera: "🇧🇷"},
            {codigo: "fra", nombre: "Francia", bandera: "🇫🇷"},
            {codigo: "esp", nombre: "España", bandera: "🇪🇸"},
            {codigo: "ger", nombre: "Alemania", bandera: "🇩🇪"},
            {codigo: "eng", nombre: "Inglaterra", bandera: "🏴󠁧󠁢󠁥󠁮󠁧󠁿"},
            {codigo: "ita", nombre: "Italia", bandera: "🇮🇹"},
            {codigo: "ned", nombre: "Países Bajos", bandera: "🇳🇱"},
            {codigo: "por", nombre: "Portugal", bandera: "🇵🇹"},
            {codigo: "uru", nombre: "Uruguay", bandera: "🇺🇾"},
            {codigo: "col", nombre: "Colombia", bandera: "🇨🇴"},
            {codigo: "mex", nombre: "México", bandera: "🇲🇽"},
            {codigo: "usa", nombre: "Estados Unidos", bandera: "🇺🇸"},
            {codigo: "jpn", nombre: "Japón", bandera: "🇯🇵"},
            {codigo: "kor", nombre: "Corea del Sur", bandera: "🇰🇷"},
            {codigo: "mar", nombre: "Marruecos", bandera: "🇲🇦"},
            {codigo: "sen", nombre: "Senegal", bandera: "🇸🇳"},
            {codigo: "cro", nombre: "Croacia", bandera: "🇭🇷"},
            {codigo: "bel", nombre: "Bélgica", bandera: "🇧🇪"},
            {codigo: "sui", nombre: "Suiza", bandera: "🇨🇭"}
        ];

        function cargarSelecciones() {
            const grid = document.getElementById('seleccionGrid');
            grid.innerHTML = selecciones.map(sel => `
                <div class="seleccion-item" data-codigo="${sel.codigo}" onclick="seleccionarPais('${sel.codigo}')">
                    <div class="bandera">${sel.bandera}</div>
                    <div class="pais-nombre">${sel.nombre}</div>
                </div>
            `).join('');
        }

        function seleccionarPais(codigo) {
            document.querySelectorAll('.seleccion-item').forEach(item => {
                item.classList.remove('selected');
            });
            const selectedItem = document.querySelector(`.seleccion-item[data-codigo="${codigo}"]`);
            if (selectedItem) {
                selectedItem.classList.add('selected');
                document.getElementById('seleccionFavorita').value = codigo;
            }
        }

        async function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `
                <div class="alert alert-${type}">
                    <i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i>
                    <span>${message}</span>
                </div>
            `;
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nombre = document.getElementById('nombre').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const seleccionFavorita = document.getElementById('seleccionFavorita').value;
            
            if (!nombre || !email || !password) {
                showAlert('Por favor completa todos los campos', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showAlert('Las contraseñas no coinciden', 'error');
                return;
            }
            
            if (password.length < 6) {
                showAlert('La contraseña debe tener al menos 6 caracteres', 'error');
                return;
            }
            
            if (!seleccionFavorita) {
                showAlert('Por favor selecciona tu selección favorita', 'error');
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showAlert('Ingresa un email válido', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/registro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, email, password, seleccion_favorita: seleccionFavorita })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('✅ Registro exitoso. Redirigiendo...', 'success');
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    showAlert(data.error || 'Error al registrarse', 'error');
                }
            } catch (error) {
                showAlert('Error de conexión con el servidor', 'error');
            }
        });

        cargarSelecciones();
    </script>
</body>
</html>
