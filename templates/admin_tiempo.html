<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurar Fechas - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; padding: 30px; margin-bottom: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 20px; color: #333; }
        .info { background: #f3f4f6; padding: 15px; border-radius: 10px; margin-bottom: 25px; font-size: 14px; }
        .tabla-fases { width: 100%; border-collapse: collapse; }
        .tabla-fases th, .tabla-fases td { padding: 15px; text-align: left; border-bottom: 1px solid #e5e7eb; vertical-align: middle; }
        .tabla-fases th { background: #f3f4f6; font-weight: 600; }
        .estado-abierto { background: #d1fae5; color: #065f46; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-block; }
        .estado-cerrado { background: #fee2e2; color: #dc2626; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-block; }
        .btn-cerrar { background: #dc2626; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; margin-right: 8px; }
        .btn-abrir { background: #10b981; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; }
        .btn-cerrar:hover { background: #b91c1c; }
        .btn-abrir:hover { background: #059669; }
        .btn-volver { background: #667eea; color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: 600; margin-top: 20px; width: 100%; }
        .fecha-info { font-size: 13px; color: #666; margin-top: 5px; }
        .acciones { white-space: nowrap; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>⏰ Control de Cierre de Pronósticos</h1>
            <div class="info">
                <i>📌 Desde aquí puedes ABRIR o CERRAR manualmente cada fase. Cuando una fase está CERRADA, los usuarios NO podrán hacer ni modificar pronósticos de esa fase.</i>
            </div>
            
            <table class="tabla-fases">
                <thead>
                    <tr>
                        <th>Fase</th>
                        <th>Estado</th>
                        <th>Fecha límite (referencia)</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaFases">
                    <!-- Se cargará dinámicamente -->
                </tbody>
            </table>
            
            <button onclick="volver()" class="btn-volver">← Volver al Panel Admin</button>
            <div id="mensaje" style="margin-top: 20px; padding: 12px; border-radius: 10px; display: none;"></div>
        </div>
    </div>
    
    <script>
        const nombresFases = {
            'grupos': 'Fase de Grupos',
            'dieciseisavos': 'Dieciseisavos de Final',
            'octavos': 'Octavos de Final',
            'cuartos': 'Cuartos de Final',
            'semis': 'Semifinales',
            'final': 'Final'
        };
        
        async function cargarConfiguraciones() {
    try {
        const response = await fetch('/api/admin/configurar-tiempo');
        const configs = await response.json();
        
        console.log('Configs recibidas:', configs);  // Para depurar
        
        const tbody = document.getElementById('tablaFases');
        tbody.innerHTML = '';
        
        for (const [key, nombre] of Object.entries(nombresFases)) {
            const config = configs.find(c => c.fase === key) || { fecha_limite: null, cerrado: false };
            const fechaStr = config.fecha_limite ? new Date(config.fecha_limite).toLocaleString('es-GT') : 'No configurada';
            const cerrado = config.cerrado === true;
            
            console.log(`Fase: ${key}, Cerrado: ${cerrado}`);  // Para depurar
            
            tbody.innerHTML += `
                <tr>
                    <td><strong>${nombre}</strong></td>
                    <td>
                        <span class="${cerrado ? 'estado-cerrado' : 'estado-abierto'}">
                            ${cerrado ? '🔒 CERRADO' : '🔓 ABIERTO'}
                        </span>
                    </td>
                    <td>${fechaStr}<div class="fecha-info">(solo referencia)</div></td>
                    <td class="acciones">
                        ${!cerrado ? `<button onclick="cerrarFase('${key}')" class="btn-cerrar">🔒 Cerrar</button>` : ''}
                        ${cerrado ? `<button onclick="abrirFase('${key}')" class="btn-abrir">🔓 Abrir</button>` : ''}
                    </td>
                </tr>
            `;
        }
    } catch (error) {
        console.error('Error:', error);
    }
}
        
        async function cerrarFase(fase) {
    if (!confirm(`⚠️ ¿Estás seguro de CERRAR los pronósticos para ${nombresFases[fase]}?`)) {
        return;
    }
    
    try {
        const response = await fetch(`/api/admin/cerrar-fase/${fase}`, { method: 'POST' });
        const data = await response.json();
        
        if (response.ok) {
            mostrarMensaje(data.mensaje, 'exito');
            await cargarConfiguraciones();  // Recargar los datos sin recargar la página
        } else {
            mostrarMensaje(data.error || 'Error al cerrar', 'error');
        }
    } catch (error) {
        mostrarMensaje('Error de conexión', 'error');
    }
}

async function abrirFase(fase) {
    if (!confirm(`⚠️ ¿Estás seguro de ABRIR los pronósticos para ${nombresFases[fase]}?`)) {
        return;
    }
    
    try {
        const response = await fetch(`/api/admin/abrir-fase/${fase}`, { method: 'POST' });
        const data = await response.json();
        
        if (response.ok) {
            mostrarMensaje(data.mensaje, 'exito');
            await cargarConfiguraciones();  // Recargar los datos sin recargar la página
        } else {
            mostrarMensaje(data.error || 'Error al abrir', 'error');
        }
    } catch (error) {
        mostrarMensaje('Error de conexión', 'error');
    }
}

async function abrirFase(fase) {
    if (!confirm(`⚠️ ¿Estás seguro de ABRIR los pronósticos para ${nombresFases[fase]}?`)) {
        return;
    }
    
    try {
        const response = await fetch(`/api/admin/abrir-fase/${fase}`, { method: 'POST' });
        const data = await response.json();
        
        if (response.ok) {
            mostrarMensaje(data.mensaje, 'exito');
            // Recargar la página para ver los cambios
            location.reload();
        } else {
            mostrarMensaje(data.error || 'Error al abrir', 'error');
        }
    } catch (error) {
        mostrarMensaje('Error de conexión', 'error');
    }
}
        
        async function abrirFase(fase) {
            if (!confirm(`⚠️ ¿Estás seguro de ABRIR los pronósticos para ${nombresFases[fase]}?\n\nLos usuarios podrán hacer y modificar pronósticos de esta fase.`)) {
                return;
            }
            
            try {
                const response = await fetch(`/api/admin/abrir-fase/${fase}`, { method: 'POST' });
                const data = await response.json();
                mostrarMensaje(data.mensaje || data.error, response.ok ? 'exito' : 'error');
                if (response.ok) cargarConfiguraciones();
            } catch (error) {
                mostrarMensaje('Error de conexión', 'error');
            }
        }
        
        function mostrarMensaje(msg, tipo) {
            const div = document.getElementById('mensaje');
            div.textContent = msg;
            div.style.background = tipo === 'exito' ? '#d1fae5' : '#fee2e2';
            div.style.color = tipo === 'exito' ? '#065f46' : '#dc2626';
            div.style.display = 'block';
            setTimeout(() => {
                div.style.display = 'none';
            }, 3000);
        }
        
        function volver() {
            window.location.href = '/admin';
        }
        
        cargarConfiguraciones();
    </script>
</body>
</html>
